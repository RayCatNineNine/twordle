<meta name="apple-mobile-web-app-title" content="Twordle">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --correct: #4caf87;
    --present: #f5a623;
    --absent: #3a3a5c;
    --text: #f0e6ff;
    --text-muted: #8888aa;
    --border: #2a2a4a;
    --key-bg: #2a2a4a;
    --key-text: #f0e6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; height: 100dvh; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    background-image: radial-gradient(ellipse at 20% 20%, #2a1a4e 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #1a2a4e 0%, transparent 50%);
  }

  header {
    width: 100%;
    max-width: 500px;
    padding: 8px 20px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    flex-shrink: 0;
  }

  .hearts {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 2px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #f0e6ff, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  #message-area {
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 4px 0 2px;
    width: 100%;
    max-width: 500px;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .message {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 6px 18px;
    border-radius: 20px;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }

  .message.info { background: rgba(229, 69, 96, 0.2); color: var(--accent); border: 1px solid rgba(229,69,96,0.3); }
  .message.win  { background: rgba(76, 175, 135, 0.2); color: var(--correct); border: 1px solid rgba(76,175,135,0.3); }
  .message.lose { background: rgba(245, 166, 35, 0.2); color: var(--accent2); border: 1px solid rgba(245,166,35,0.3); }

  #board-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
    width: 100%;
    min-height: 0;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    padding: 4px;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }

  .tile {
    width: 52px;
    height: 52px;
    border: 2px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text);
    transition: border-color 0.1s;
    position: relative;
    user-select: none;
  }

  .tile.filled { border-color: #5a5a7a; }

  .tile.pop {
    animation: tilePop 0.1s ease;
  }

  .tile.shake {
    animation: tileShake 0.5s ease;
  }

  .tile.flip-correct {
    animation: flipCorrect 0.5s ease forwards;
  }
  .tile.flip-present {
    animation: flipPresent 0.5s ease forwards;
  }
  .tile.flip-absent {
    animation: flipAbsent 0.5s ease forwards;
  }

  .tile.revealed.correct { background: var(--correct); border-color: var(--correct); color: white !important; }
  .tile.revealed.present { background: var(--present); border-color: var(--present); color: white !important; }
  .tile.revealed.absent  { background: var(--absent);  border-color: var(--absent);  color: #ccccdd !important; }

  .tile.bounce { animation: tileBounce 0.6s ease forwards; }

  #new-game-btn {
    display: none;
    margin: 6px auto 0;
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--accent), #c73652);
    color: white;
    border: none;
    border-radius: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
  }

  #new-game-btn:active { transform: scale(0.96); }

  /* Responsive for small screens */
  @media (max-height: 700px) {
    .tile { width: 46px; height: 46px; font-size: 20px; }
    .key  { height: 44px; font-size: 12px; }
    h1    { font-size: 20px; }
  }
  @media (max-height: 620px) {
    .tile { width: 40px; height: 40px; font-size: 18px; }
    .key  { height: 38px; font-size: 11px; }
    h1    { font-size: 18px; }
    .hearts { display: none; }
    .subtitle { display: none; }
  }
    width: 100%;
    max-width: 500px;
    padding: 4px 8px 10px;
    flex-shrink: 0;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  .key {
    height: 48px;
    min-width: 28px;
    padding: 0 4px;
    flex: 1;
    max-width: 38px;
    border: none;
    border-radius: 6px;
    background: var(--key-bg);
    color: var(--key-text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.5px;
    -webkit-user-select: none;
    user-select: none;
  }

  .key:active { transform: scale(0.94); }
  .key.wide { max-width: 56px; font-size: 11px; letter-spacing: 0; }

  .key.correct { background: #4caf87; color: white; }
  .key.present { background: #4caf87; color: white; }
  .key.absent  { background: #c0392b; color: #ffaaaa; }

  #stats-bar {
    display: flex;
    gap: 20px;
    justify-content: center;
    padding: 4px 20px 2px;
    width: 100%;
    max-width: 500px;
    flex-shrink: 0;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  @keyframes tilePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes tileShake {
    0%, 100% { transform: translateX(0); }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px); }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px); }
    75%  { transform: translateX(-3px); }
    90%  { transform: translateX(3px); }
  }

  @keyframes flipCorrect {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(-90deg); background: transparent; border-color: #5a5a7a; }
    100% { transform: rotateX(0); background: var(--correct); border-color: var(--correct); color: white; }
  }

  @keyframes flipPresent {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(-90deg); background: transparent; border-color: #5a5a7a; }
    100% { transform: rotateX(0); background: var(--present); border-color: var(--present); color: white; }
  }

  @keyframes flipAbsent {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(-90deg); background: transparent; border-color: #5a5a7a; }
    100% { transform: rotateX(0); background: var(--absent); border-color: var(--absent); color: var(--text-muted); }
  }

  @keyframes tileBounce {
    0%, 100% { transform: translateY(0); }
    30%  { transform: translateY(-16px); }
    60%  { transform: translateY(-8px); }
    80%  { transform: translateY(-4px); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

</style>
</head>

  <div class="stat"><div class="stat-num" id="stat-best">0</div><div class="stat-label">Best</div></div>
</div>

<div id="message-area"></div>

<div id="board-container">

</div>

<div id="keyboard"></div>
<div style="text-align:center; padding-bottom:4px;">

</div>

// ── State ──────────────────────────────────────────────────────────────────
let answer = '', currentRow = 0, currentCol = 0, gameOver = false;
let board = Array.from({length:6}, ()=>Array(5).fill(''));
let revealed = Array.from({length:6}, ()=>Array(5).fill(''));

// ── Stats ──────────────────────────────────────────────────────────────────
let stats = JSON.parse(localStorage.getItem('wrdl-stats')||'{"played":0,"won":0,"streak":0,"best":0}');

function saveStats() { localStorage.setItem('wrdl-stats', JSON.stringify(stats)); }
function renderStats() {
  document.getElementById('stat-played').textContent = stats.played;
  document.getElementById('stat-won').textContent = stats.won;
  document.getElementById('stat-streak').textContent = stats.streak;
  document.getElementById('stat-best').textContent = stats.best;
}

// ── Board ──────────────────────────────────────────────────────────────────
function buildBoard() {
  const b = document.getElementById('board');
  b.innerHTML = '';
  // Calculate tile size based on available space
  const vw = Math.min(window.innerWidth, 500);
  // Available height = total - header - stats - message - keyboard - padding
  const headerH = document.querySelector('header').offsetHeight;
  const statsH = document.getElementById('stats-bar').offsetHeight;
  const msgH = document.getElementById('message-area').offsetHeight;
  const kbH = document.getElementById('keyboard').offsetHeight;
  const availH = window.innerHeight - headerH - statsH - msgH - kbH - 40;
  const tileByH = Math.floor((availH - 5*6) / 6); // 6 rows, 5 gaps
  const tileByW = Math.floor((vw - 60) / 5);       // 5 cols
  const tileSize = Math.min(52, tileByH, tileByW);
  b.style.gridTemplateRows = `repeat(6, ${tileSize}px)`;
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      tile.style.width = tile.style.height = tileSize + 'px';
      tile.style.fontSize = Math.floor(tileSize * 0.44) + 'px';
      row.appendChild(tile);
    }
    b.appendChild(row);
  }
}

function updateTile(r, c, letter) {
  const tile = document.getElementById(`tile-${r}-${c}`);
  tile.textContent = letter.toUpperCase();
  if (letter) {
    tile.classList.add('filled');
    tile.classList.remove('pop');
    void tile.offsetWidth;
    tile.classList.add('pop');
  } else {
    tile.classList.remove('filled');
    tile.textContent = '';
  }
}

// ── Keyboard ───────────────────────────────────────────────────────────────
const KB_ROWS = [['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','⌫']];

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.dataset.state = '';
      btn.id = 'key-' + k;
      btn.textContent = k === '⌫' ? '⌫' : k.toUpperCase();
      btn.addEventListener('click', () => handleKey(k === '⌫' ? 'Backspace' : k));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function updateKeyColors() {
  const keyState = {};
  for (let r = 0; r < currentRow; r++) {
    for (let c = 0; c < 5; c++) {
      const letter = board[r][c];
      const state = revealed[r][c];
      const priority = {correct:3, present:2, absent:1};
      if (!keyState[letter] || priority[state] > priority[keyState[letter]]) {
        keyState[letter] = state;
      }
    }
  }
  Object.entries(keyState).forEach(([letter, state]) => {
    const btn = document.getElementById('key-' + letter.toLowerCase());
    if (btn) { btn.className = 'key' + (btn.textContent.length > 1 ? ' wide' : '') + ' ' + state; }
  });
}

// ── Guess Logic ────────────────────────────────────────────────────────────
function evaluate(guess, answer) {
  const result = Array(5).fill('absent');
  const ansArr = answer.split('');
  const gArr = guess.split('');
  // Pass 1: correct
  gArr.forEach((l,i) => { if (l === ansArr[i]) { result[i] = 'correct'; ansArr[i] = null; gArr[i] = null; } });
  // Pass 2: present
  gArr.forEach((l,i) => {
    if (l === null) return;
    const j = ansArr.indexOf(l);
    if (j !== -1) { result[i] = 'present'; ansArr[j] = null; }
  });
  return result;
}

function revealRow(r, result, onDone) {
  const DELAY = 300;
  result.forEach((state, c) => {
    setTimeout(() => {
      revealed[r][c] = state;
      const tile = document.getElementById(`tile-${r}-${c}`);
      tile.classList.add('flip-' + state);
      tile.addEventListener('animationend', () => {
        tile.classList.remove('flip-' + state);
        tile.classList.add('revealed', state);
        // Update this letter's key colour as soon as its tile finishes flipping
        const letter = board[r][c];
        updateSingleKey(letter, state);
      }, {once:true});
      if (c === 4) setTimeout(() => { if (onDone) onDone(); }, DELAY);
    }, c * DELAY);
  });
}

function updateSingleKey(letter, newState) {
  const btn = document.getElementById('key-' + letter.toLowerCase());
  if (!btn) return;
  const priority = {correct:3, present:2, absent:1};
  // Only upgrade state, never downgrade (e.g. don't overwrite green with red)
  const current = btn.dataset.state || '';
  if (!current || priority[newState] > (priority[current] || 0)) {
    btn.dataset.state = newState;
    btn.className = 'key' + (btn.textContent.length > 1 ? ' wide' : '') + ' ' + newState;
  }
}

function bounceRow(r) {
  for (let c = 0; c < 5; c++) {
    setTimeout(() => {
      const tile = document.getElementById(`tile-${r}-${c}`);
      tile.classList.add('bounce');
      tile.addEventListener('animationend', () => tile.classList.remove('bounce'), {once:true});
    }, c * 80);
  }
}

// ── Message ────────────────────────────────────────────────────────────────
let msgTimer;
function showMessage(text, type='info', duration=2200) {
  const area = document.getElementById('message-area');
  clearTimeout(msgTimer);
  area.innerHTML = `<div class="message ${type}">${text}</div>`;
  if (duration > 0) msgTimer = setTimeout(() => area.innerHTML = '', duration);
}

// ── Input ──────────────────────────────────────────────────────────────────
function handleKey(key) {
  if (gameOver) return;
  if (key === 'Backspace' || key === '⌫') {
    if (currentCol > 0) { currentCol--; board[currentRow][currentCol] = ''; updateTile(currentRow, currentCol, ''); }
    return;
  }
  if (key === 'Enter') { submitGuess(); return; }
  if (/^[a-zA-Z]$/.test(key) && currentCol < 5) {
    board[currentRow][currentCol] = key.toLowerCase();
    updateTile(currentRow, currentCol, key);
    currentCol++;
  }
}

function submitGuess() {
  if (currentCol < 5) { shakeRow(currentRow); showMessage('Not enough letters', 'info'); return; }
  const guess = board[currentRow].join('');
  if (!WORDS.includes(guess)) { shakeRow(currentRow); showMessage('Not in word list', 'info'); return; }

  const result = evaluate(guess, answer);
  revealRow(currentRow, result, () => {
    if (result.every(r => r === 'correct')) {
      gameOver = true;
      bounceRow(currentRow);
      const msgs = ['Perfect! 💕','Brilliant! ✨','Amazing! 🌟','You got it! 💖','Genius! 🎉','Well done! 🥰'];
      showMessage(msgs[Math.min(currentRow, msgs.length-1)], 'win', 0);
      stats.played++; stats.won++; stats.streak++; stats.best = Math.max(stats.best, stats.streak);
      saveStats(); renderStats();
      document.getElementById('new-game-btn').style.display = 'inline-block';
      return;
    }
    currentRow++;
    currentCol = 0;
    if (currentRow === 6) {
      gameOver = true;
      showMessage(answer.toUpperCase(), 'lose', 0);
      stats.played++; stats.streak = 0;
      saveStats(); renderStats();
      document.getElementById('new-game-btn').style.display = 'inline-block';
    }
  });
}

function shakeRow(r) {
  const row = document.getElementById(`row-${r}`);
  row.classList.add('shake');
  row.addEventListener('animationend', () => row.classList.remove('shake'), {once:true});
}

// ── Physical keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  handleKey(e.key);
});

// ── New Game ───────────────────────────────────────────────────────────────
function newGame() {
  answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0; currentCol = 0; gameOver = false;
  board = Array.from({length:6}, ()=>Array(5).fill(''));
  revealed = Array.from({length:6}, ()=>Array(5).fill(''));
  buildBoard();
  buildKeyboard();
  document.getElementById('message-area').innerHTML = '';
  document.getElementById('new-game-btn').style.display = 'none';
}

// ── Init ───────────────────────────────────────────────────────────────────
renderStats();
newGame();

window.addEventListener('resize', () => { buildBoard(); });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
